<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Món Quà Nhỏ">
    <link rel="apple-touch-icon" href="assets/images/icons/couple.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/icons/couple.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/images/icons/couple.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/images/icons/couple.png">
    <link rel="icon" type="image/png" href="assets/images/icons/couple.png">
    <meta name="theme-color" content="#1b0a1c">
    <title>Món Quà Nhỏ</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ========== PASSCODE SCREEN ========== -->
    <div id="passcodeScreen">
        <div class="passcode-bears" id="passcodeBears">
            <img src="assets/images/characters/bearwait.png" alt="" class="passcode-bear left pos-0" id="bearLeft">
            <img src="assets/images/characters/bearflower.png" alt="" class="passcode-bear right pos-0" id="bearRight">
            <img src="assets/images/icons/couple.png" alt="" class="passcode-couple-img" id="coupleImg">
        </div>
        <div class="hearts-passcode">
            <span class="heart-fly">💕</span><span class="heart-fly">❤️</span>
            <span class="heart-fly">💗</span><span class="heart-fly">💖</span>
            <span class="heart-fly">💕</span><span class="heart-fly">❤️</span>
            <span class="heart-fly">💗</span><span class="heart-fly">💖</span>
            <span class="heart-fly">💕</span><span class="heart-fly">❤️</span>
        </div>
        <div class="passcode-title">Nhập mật khẩu</div>
        <div class="passcode-subtitle">Mở món quà đặc biệt</div>
        <div class="passcode-dots" id="passcodeDots">
            <div class="passcode-dot" data-i="0"></div>
            <div class="passcode-dot" data-i="1"></div>
            <div class="passcode-dot" data-i="2"></div>
            <div class="passcode-dot" data-i="3"></div>
        </div>
        <div class="passcode-keypad">
            <button type="button" class="passcode-btn" data-num="1">1</button>
            <button type="button" class="passcode-btn" data-num="2">2</button>
            <button type="button" class="passcode-btn" data-num="3">3</button>
            <button type="button" class="passcode-btn" data-num="4">4</button>
            <button type="button" class="passcode-btn" data-num="5">5</button>
            <button type="button" class="passcode-btn" data-num="6">6</button>
            <button type="button" class="passcode-btn" data-num="7">7</button>
            <button type="button" class="passcode-btn" data-num="8">8</button>
            <button type="button" class="passcode-btn" data-num="9">9</button>
            <button type="button" class="passcode-btn empty"></button>
            <button type="button" class="passcode-btn" data-num="0">0</button>
            <button type="button" class="passcode-btn empty"></button>
        </div>
        <button type="button" class="passcode-cancel" id="passcodeCancel">Hủy</button>
    </div>

    <div id="loading">
        <span>Đang tải...</span>
        <div id="progress-container">
            <div id="progress"></div>
        </div>
    </div>

    <div id="ui">
        <div id="info"></div>
    </div>

    <div id="start-wrap">
        <div id="start-label">Giữ để bắt đầu</div>
        <svg viewBox="0 0 68 68">
            <circle class="ring-pulse" cx="34" cy="34" r="28" />
            <circle class="ring-track" cx="34" cy="34" r="26" />
            <circle class="ring-fill" id="ring-fill" cx="34" cy="34" r="26" />
        </svg>
    </div>

    <div id="transition-overlay"></div>
    <div id="sphere-click-hint" aria-hidden="true">Click vào nhé</div>
    <button type="button" id="btn-flying-corner" aria-label="Ảnh bay lên">💌</button>
    <div id="sphere-particles-bg"></div>

    <div id="cupid-letter-overlay">
        <div class="cupid-space"></div>
        <img id="cupid-flying-img" src="assets/images/letters/cupidletter.png" alt="Cupid" />
        <img id="letter-envelope-img" src="assets/images/letters/letterimage.png" alt="Phong bì" />
        <div id="cupid-letter-frame">
            <div class="letter-butterfly-left"><img src="assets/buomtrai.png" alt="" /></div>
            <div class="letter-butterfly-right"><img src="assets/buomphai.png" alt="" /></div>
            <div class="letter-bottom-bg"></div>
            <div class="letter-content"></div>
            <div class="letter-image-wrap" id="letterImageWrap" style="display:none">
                <img class="letter-inline-image" id="letterInlineImage" src="" alt="">
                <span class="letter-image-caption">♥</span>
            </div>
        </div>
    </div>

    <!-- Lightbox xem ảnh chi tiết -->
    <div id="imageLightbox">
        <div class="lightbox-backdrop"></div>
        <div class="lightbox-content">
            <img id="lightboxImage" src="" alt="Ảnh chi tiết" style="display:none;" />
            <video id="lightboxVideo" src="" controls playsinline autoplay loop style="display:none;"></video>
        </div>
        <button type="button" class="lightbox-close" id="lightboxClose">✕</button>
    </div>

    <canvas id="webglCanvas"></canvas>

    <!-- Bảo vệ DevTools -->
    <script src="detect-devtools.js"></script>
    <script type='text/javascript'>
        // Bypass for developers
        const keyName = 'key';
        const keyValue = '9ac7ec230e0e4513578f309d6d3579ad';
        // Handle via config
        DisableDevtool({
            tkName: keyName,
            md5: keyValue,
            interval: '100',
        });
    </script>

    <!-- APP CONFIG — Chỉnh sửa các giá trị tại đây -->
    <script src="config.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/",
          "simplex-noise": "https://cdn.skypack.dev/simplex-noise@4.0.1"
        }
      }
    </script>

    <!-- APP chính -->
    <script type="module" src="app.js"></script>
</body>

</html>
